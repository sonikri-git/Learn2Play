<!-- ========================================= -->
<!-- BACKGROUND VIDEO -->
<!-- ========================================= -->

<video
  class="bg-video"
  autoplay
  muted
  loop
  playsinline
>
  <source
    src="assets/hero-video.mp4"
    type="video/mp4"
  />
</video>

<!-- ========================================= -->
<!-- MAIN PAGE -->
<!-- ========================================= -->

<div class="page">

  <!-- ===================================== -->
  <!-- UPLOAD CARD -->
  <!-- ===================================== -->

  <div class="upload-card">

    <!-- TITLE -->

    <h2>Upload Study Material</h2>

    <p class="subtitle">
      Drag & drop or select your files
      to generate AI-powered quizzes
    </p>

    <!-- ===================================== -->
    <!-- DROP ZONE -->
    <!-- ===================================== -->

    <label
      class="upload-zone"

      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"

      [class.active]="dragging"
    >

      <input
        type="file"
        multiple
        hidden
        accept=".pdf,.doc,.docx,.txt,.ppt,.pptx"
        (change)="onFileSelected($event)"
      />

      <div class="upload-content">

        <h3>
          📂 Drop files here
        </h3>

        <p>
          or click to browse
        </p>

        <small>
          Supported:
          PDF, DOC, DOCX,
          TXT, PPT, PPTX
        </small>

      </div>

    </label>

    <!-- ===================================== -->
    <!-- FILE LIST -->
    <!-- ===================================== -->

    <div
      class="file-list"
      *ngIf="selectedFiles().length"
    >

      <div
        class="file-item"
        *ngFor="
          let file of selectedFiles();
          let i = index
        "
      >

        <div class="file-info">

          <span class="file-icon">
            📄
          </span>

          <div>

            <strong>
              {{ file.name }}
            </strong>

            <p>
              {{
                (file.size / 1024)
                | number:'1.0-0'
              }}
              KB
            </p>

          </div>

        </div>

        <!-- REMOVE BUTTON -->

        <button
          class="remove-btn"
          (click)="removeFile(i)"
        >
          ✖
        </button>

      </div>

    </div>

    <!-- EMPTY STATE -->

    <p
      class="empty-text"
      *ngIf="!selectedFiles().length"
    >
      No files selected
    </p>

    <!-- ===================================== -->
    <!-- QUESTION TYPES -->
    <!-- ===================================== -->

    <div class="question-section">

      <h3>
        Select Question Types
      </h3>

      <div class="question-options">

        <!-- MCQ -->

        <button
          class="type-btn"
          [class.active]="
            selectedQuestionTypes.includes('MCQ')
          "
          (click)="toggleQuestionType('MCQ')"
        >
          MCQ
        </button>

        <!-- TRUE FALSE -->

        <button
          class="type-btn"
          [class.active]="
            selectedQuestionTypes.includes('TRUE_FALSE')
          "
          (click)="toggleQuestionType('TRUE_FALSE')"
        >
          True / False
        </button>

        <!-- SHORT ANSWER -->

        <button
          class="type-btn"
          [class.active]="
            selectedQuestionTypes.includes('SHORT_ANSWER')
          "
          (click)="toggleQuestionType('SHORT_ANSWER')"
        >
          Short Answer
        </button>

        <!-- FILL BLANKS -->

        <button
          class="type-btn"
          [class.active]="
            selectedQuestionTypes.includes('FILL_BLANKS')
          "
          (click)="toggleQuestionType('FILL_BLANKS')"
        >
          Fill in the Blanks
        </button>

      </div>

    </div>

    <!-- ===================================== -->
    <!-- ACTION BUTTONS -->
    <!-- ===================================== -->

    <div class="action-buttons">

      <!-- UPLOAD -->

      <button
        class="upload-btn"
        (click)="startUpload()"
      >
        Upload & Generate Quiz
      </button>

      <!-- CLEAR -->

      <button
        class="clear-btn"
        (click)="clear()"
      >
        Clear
      </button>

    </div>

    <!-- ===================================== -->
    <!-- PROGRESS BAR -->
    <!-- ===================================== -->

    <div
      class="progress-wrapper"
      *ngIf="uploading()"
    >

      <div class="progress-bar">

        <div
          class="progress-fill"
          [style.width.%]="progress()"
        >
        </div>

      </div>

      <p>
        Uploading...
        {{ progress() }}%
      </p>

    </div>

  </div>

  <!-- ===================================== -->
  <!-- FOOTER -->
  <!-- ===================================== -->

  <p class="footer">
    © 2026 Learn2Play • Capstone Project
  </p>

</div>
