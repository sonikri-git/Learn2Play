<div class="page">

  <header class="hero">

    <video
      class="bg-video"
      autoplay
      muted
      loop
      playsinline>

      <source
        src="assets/hero-video.mp4"
        type="video/mp4">

    </video>

    <div class="hero-overlay">

      <img
        class="hero-logo"
        src="assets/logo.png"
        alt="Learn2Play">

      <h1 class="hero-title">
        Learn2Play
      </h1>

      <p class="hero-sub">
        Study smarter, play better.
      </p>

    </div>

  </header>

  <main class="center-wrap">

    <mat-card class="login-card">

      <h2>Welcome Back</h2>

      <p class="subtitle">
        Sign in to continue
      </p>

      <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()">

        <mat-form-field
          appearance="outline"
          class="field">

          <mat-label>Email</mat-label>

          <mat-icon matPrefix>
            mail
          </mat-icon>

          <input
            matInput
            type="email"
            formControlName="email">

        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="field">

          <mat-label>Password</mat-label>

          <mat-icon matPrefix>
            lock
          </mat-icon>

          <input
            matInput
            [type]="isPasswordVisible() ? 'text' : 'password'"
            formControlName="password">

          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePassword()">

            <mat-icon>
              {{ isPasswordVisible() ? 'visibility_off' : 'visibility' }}
            </mat-icon>

          </button>

        </mat-form-field>

        <div class="row">

          <mat-checkbox formControlName="remember">
            Remember me
          </mat-checkbox>

          <a
            href="#"
            (click)="forgotPassword($event)">
            Forgot password?
          </a>

        </div>

        <button
          mat-raised-button
          class="btn-primary"
          type="submit">

          Sign In

        </button>

      </form>

      <div class="card-footer">

        <span>
          New here?
        </span>

        <a
          href="#"
          (click)="goToSignup($event)">
          Create an account
        </a>

      </div>

    </mat-card>

  </main>

</div>
