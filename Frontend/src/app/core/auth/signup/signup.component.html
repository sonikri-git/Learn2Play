<div class="page">

  <header class="hero">

    <img
      class="hero-logo"
      src="assets/logo.png"
      alt="Learn2Play"
    />

    <h1 class="hero-title">
      Learn2Play
    </h1>

    <p class="hero-sub">
      Create your account and start learning.
    </p>

  </header>

  <main class="center-wrap">

    <mat-card class="signup-card">

      <h2>Create Account</h2>

      <p class="subtitle">
        Join Learn2Play today
      </p>

      <form>

        <mat-form-field
          appearance="outline"
          class="field"
        >
          <mat-label>Full Name</mat-label>

          <input
            matInput
            [(ngModel)]="name"
            name="name"
          >
        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="field"
        >
          <mat-label>Email</mat-label>

          <input
            matInput
            type="email"
            [(ngModel)]="email"
            name="email"
          >
        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="field"
        >
          <mat-label>Password</mat-label>

          <input
            matInput
            type="password"
            [(ngModel)]="password"
            name="password"
          >
        </mat-form-field>

        <button
          mat-raised-button
          class="btn-primary"
          (click)="register()"
          type="button"
        >
          Create Account
        </button>

      </form>

      <div class="card-footer">

        <span>
          Already have an account?
        </span>

        <a
          href="#"
          (click)="goToLogin($event)"
        >
          Sign In
        </a>

      </div>

    </mat-card>

  </main>

</div>
