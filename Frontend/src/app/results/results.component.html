<div class="results-page">

  <div class="results-card">

    <h1>
      Quiz Completed 🎉
    </h1>

    <div class="score-circle">

      {{ percentage }}%

    </div>

    <h2>
      Score:
      {{ score }}/{{ totalQuestions }}
    </h2>

    <p>
      Great job completing the quiz.
    </p>

    <div class="stats">

      <div class="stat-box">

        <h3>{{ score }}</h3>

        <span>Correct</span>

      </div>

      <div class="stat-box">

        <h3>
          {{ totalQuestions - score }}
        </h3>

        <span>Incorrect</span>

      </div>

    </div>

    <div class="button-group">

      <button
        class="primary-btn"
        (click)="reviewAnswers()">

        Review Answers

      </button>

      <button
        class="secondary-btn"
        (click)="backToDashboard()">

        Dashboard

      </button>

    </div>

  </div>

</div>
